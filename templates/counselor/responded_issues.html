{% extends "base.html" %}

{% block title %}Responded Issues{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">Responded Issues</h2>

    <table class="table table-bordered">
        <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Description</th>
            <th>Response</th>
        </tr>

        {% for issue in issues %}
        <tr>
            <td>{{ issue.title }}</td>
            <td>{{ issue.category }}</td>
            <td>{{ issue.description }}</td>
            <td>{{ issue.response }}</td>
        </tr>
        {% endfor %}
    </table>

    <a href="{{ url_for('counselor_dashboard') }}" class="btn btn-secondary">Back</a>
</div>
{% endblock %}
