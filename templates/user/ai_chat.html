{% extends "base.html" %}

{% block title %}AI Assistant{% endblock %}

{% block content %}
<!-- Bootstrap CSS & Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background-color: #f8f9fa;
}

.ai-container {
    max-width: 900px;
    margin: 50px auto;
    background: #ffffff;
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

.ai-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.ai-header h2 {
    font-weight: 700;
}

.chat-box {
    max-height: 400px;
    overflow-y: auto;
    border: 1px solid #dee2e6;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 20px;
    background-color: #f1f3f5;
}

.chat-message {
    margin-bottom: 15px;
}

.chat-message.user {
    text-align: right;
}

.chat-message.user .message {
    display: inline-block;
    background-color: #0d6efd;
    color: white;
    padding: 10px 15px;
    border-radius: 20px 20px 0 20px;
}

.chat-message.ai .message {
    display: inline-block;
    background-color: #e9ecef;
    color: #212529;
    padding: 10px 15px;
    border-radius: 20px 20px 20px 0;
}

.send-form {
    display: flex;
    gap: 10px;
}

.send-form input {
    flex: 1;
    border-radius: 50px;
    padding: 10px 20px;
    border: 1px solid #ced4da;
}

.send-form button {
    border-radius: 50px;
    padding: 10px 20px;
}
</style>

<div class="ai-container">
    <!-- Header -->
    <div class="ai-header">
        <h2>AI Assistant</h2>
        <a href="/user_dashboard" class="btn btn-secondary">Back to Dashboard</a>
    </div>

    <!-- Chat Box -->
    <div class="chat-box" id="chat-box">
        {% if chat_history %}
            {% for msg in chat_history %}
                <div class="chat-message {{ 'user' if msg.sender == 'user' else 'ai' }}">
                    <div class="message">{{ msg.text }}</div>
                </div>
            {% endfor %}
        {% else %}
            <p class="text-center text-muted">Start chatting with AI Assistant...</p>
        {% endif %}
    </div>

    <!-- Input Form -->
    <form class="send-form" method="POST" action="{{ url_for('ai_chat') }}">
        <input type="text" name="message" placeholder="Type your question..." required autocomplete="off">
        <button type="submit" class="btn btn-primary">Send</button>
    </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Auto-scroll chat box to bottom
    const chatBox = document.getElementById('chat-box');
    chatBox.scrollTop = chatBox.scrollHeight;
</script>

{% endblock %}
