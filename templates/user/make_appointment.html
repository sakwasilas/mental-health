{% extends "base.html" %}

{% block title %}Make Appointment{% endblock %}

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5" style="max-width: 600px;">
    <h2 class="mb-4">Request an Appointment</h2>

    <form method="POST">
        <div class="mb-3">
            <label for="counselor_name" class="form-label">Select Counselor</label>
            <select class="form-select" name="counselor_name" required>
                <option value="">-- Choose Counselor --</option>
                {% for counselor in counselors %}
                    <option value="{{ counselor.full_name }}">{{ counselor.full_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="date" class="form-label">Select Date</label>
            <input type="date" class="form-control" name="date" required>
        </div>

        <div class="mb-3">
            <label for="time" class="form-label">Select Time</label>
            <input type="time" class="form-control" name="time" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Submit Request</button>
    </form>

    <a href="{{ url_for('user_dashboard') }}" class="btn btn-secondary mt-3 w-100">Back to Dashboard</a>
</div>

{% endblock %}
